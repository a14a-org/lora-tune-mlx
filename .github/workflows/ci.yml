name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Matches the project's documented runtime (Python 3.13, see setup.sh / README).
          python-version: "3.14.6"
          cache: pip

      - name: Install CI tooling
        # The runtime stack (mlx, mlx-lm, ...) is Apple-silicon only and has no
        # Linux wheels, so `pip install -r requirements.txt` cannot run on
        # ubuntu-latest. The quality gate exercises the pure, standard-library
        # data-preprocessing helpers, so it only needs the dev tooling declared
        # in requirements.txt (pytest, mypy) plus ruff for linting.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff mypy

      - name: Verify requirements.txt is well-formed
        # Catch syntax/typo regressions in the dependency manifest without
        # attempting to install the Apple-only ML stack on Linux.
        run: python -m pip install --dry-run --no-deps -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest
